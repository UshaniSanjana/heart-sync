server:
  port: 8084

spring:
  application:
    name: ai-inference-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://mongo_admin:mongo_pass@localhost:27017/ai_db?authSource=admin}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:heartsync}
    password: ${RABBITMQ_PASSWORD:heartsync_pass}

# MinIO settings for downloading ECG images
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minio_admin}
  secret-key: ${MINIO_SECRET_KEY:minio_pass}
  bucket: ${MINIO_BUCKET:ecg-files}

# Python ECG model sidecar service
ecg-model:
  service-url: ${ECG_MODEL_SERVICE_URL:http://localhost:8086}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
