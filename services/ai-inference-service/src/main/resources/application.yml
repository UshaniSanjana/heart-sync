server:
  port: 8084

spring:
  application:
    name: ai-inference-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://mongo_admin:mongo_pass@localhost:27017/ai_db?authSource=admin}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:heartsync}
    password: ${RABBITMQ_PASSWORD:heartsync_pass}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:heartsync}

ai-python:
  service-url: ${AI_PYTHON_URL:http://ai-python-service:8000}

management:
  endpoints:
    web:
      exposure:
        include: health, info
