server:
  port: 8082

spring:
  application:
    name: iam-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/iam_db}
    username: ${SPRING_DATASOURCE_USERNAME:iam_user}
    password: ${SPRING_DATASOURCE_PASSWORD:iam_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update   # auto-creates/updates the users table
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:heartsync-super-secret-jwt-key-change-in-production-32chars}
  expiration: 86400000   # 24 hours in milliseconds

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
